<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <rect x="20" y="60" width="760" height="80" fill="#f4e1c1" stroke="#8b5a2b" stroke-width="2" rx="6"/>
  <!-- 15 cm ruler (multiple placements) -->
  <rect x="40" y="30" width="120" height="12" fill="#c0c0c0"/>
  <line x1="40" y1="36" x2="160" y2="36" stroke="#000" stroke-width="1"/>
  <text x="40" y="25" font-size="12">15 cm ruler (multiple placements)</text>
  <!-- 30 cm ruler -->
  <rect x="200" y="30" width="220" height="12" fill="#d0d0d0"/>
  <line x1="200" y1="36" x2="420" y2="36" stroke="#000" stroke-width="1"/>
  <text x="200" y="25" font-size="12">30 cm ruler (fewer placements)</text>
  <!-- metre rule -->
  <rect x="460" y="30" width="320" height="12" fill="#e0e0e0"/>
  <line x1="460" y1="36" x2="780" y2="36" stroke="#000" stroke-width="1"/>
  <text x="460" y="25" font-size="12">Metre rule (covers most length)</text>
  <!-- arrows showing measurement positions -->
  <line x1="100" y1="100" x2="100" y2="150" stroke="#333" stroke-dasharray="4"/>
  <line x1="300" y1="100" x2="300" y2="150" stroke="#333" stroke-dasharray="4"/>
  <line x1="620" y1="100" x2="620" y2="150" stroke="#333" stroke-dasharray="4"/>
</svg>
