# If you modify this file, PreTeXt will no longer automatically update it.
#
name: PreTeXt-CLI Actions
on:
    # Runs on pull requests
    pull_request:
        branches: ["*"]
    # Runs on pushes to main
    push:
        branches: ["main"]
    # Runs on demand
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        container: oscarlevin/pretext:full

        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: install deps
              run: pip install -r requirements.txt

            # - name: install tex dependencies
            #   run: |
            #     tlmgr option repository https://ftp.math.utah.edu/pub/tex/historic/systems/texlive/2025/tlnet-final
            #     tlmgr update --self
            #     tlmgr install tkz-euclide tikz-3dplot longdivision

            # tlmgr can ONLY talk to a package repository from the SAME TeX Live
            # release that is installed in the container, otherwise it aborts with
            # "cross release updates are not supported". The oscarlevin/pretext:full
            # tag is a moving target, so don't hard-code a year: detect the installed
            # release and pick the matching repository automatically.
            - name: install tex dependencies
              run: |
                set -x
                TLYEAR="$(tlmgr --version | sed -n 's/.*TeX Live \([0-9]\{4\}\).*/\1/p' | head -n1)"
                echo "Detected TeX Live release: ${TLYEAR:-unknown}"
                FINAL="https://texlive.info/historic/systems/texlive/${TLYEAR}/tlnet-final"
                CURRENT="https://mirror.ctan.org/systems/texlive/tlnet"
                # Use the frozen tlnet-final for that year if it exists (older releases),
                # otherwise fall back to the live CTAN tlnet (the current release).
                if [ -n "$TLYEAR" ] && curl -fsI "$FINAL/" >/dev/null 2>&1; then
                    REPO="$FINAL"
                else
                    REPO="$CURRENT"
                fi
                echo "Using tlmgr repository: $REPO"
                tlmgr option repository "$REPO"
                # Don't hard-fail the job if there is nothing to update / already current.
                tlmgr update --self || true
                tlmgr install tkz-euclide tikz-3dplot || true

            - name: install local ptx files
              run: pretext --version

            - name: build deploy targets
              run: |
                version="$(pretext --version)"
                major="$(echo $version | cut -d '.' -f 1)"
                minor="$(echo $version | cut -d '.' -f 2)"
                if [ "$major" -ge 2 -a "$minor" -ge 5 ]; then
                    echo "PreTeXt version is 2.5 or greater; using new build command"
                    pretext build --deploys
                else
                    echo "PreTeXt version is less than 2.5, using old build command"
                    pretext build
                fi

            # Surfaces the real LaTeX error if the build above fails. The saved
            # GitHub log only showed "exit code 1"; this prints the tex logs so the
            # underlying tkz-euclide / package error is visible in the run output.
            - name: Show LaTeX logs on build failure
              if: failure()
              run: |
                echo "=== Most recent .log files ==="
                find . -name '*.log' -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -n 20 | cut -d' ' -f2-
                echo "=== Tails of recent .log files ==="
                for f in $(find . -name '*.log' -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -n 10 | cut -d' ' -f2-); do
                    echo "----- $f -----"
                    tail -n 80 "$f"
                done

            - name: Copy custom stackapicalls.js
              run: |
                cp assets/pretext/js/pretext-stack/stackapicalls.js output/web/_static/pretext/js/pretext-stack/stackapicalls.js

            - name: Copy custom stackapicalls.js
              run: |
                cp assets/pretext/js/pretext-stack/stackapicalls.js output/student/_static/pretext/js/pretext-stack/stackapicalls.js

            - name: Copy version without review links into student subfolder
              run: |
                cp -r output/student/ output/web/

            - name: Copy plans version into web
              run: |
                cp -r output/plans/ output/web/

            - name: build deploy target print
              run: pretext build print

            - name: Copy built PDF into assets folder
              run: |
                cp output/print/main.pdf assets/CBC-Grade-11-Maths.pdf

            - name: stage deployment
              run: pretext deploy --stage-only

            - name: Bundle output/stage as artifact
              uses: actions/upload-artifact@v4
              with:
                  name: deploy
                  path: output/stage

    deploy-cloudflare:
        runs-on: ubuntu-latest
        needs: build
        if: vars.CLOUDFLARE_PROJECT_NAME != ''
        permissions:
          contents: read
          deployments: write

        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: deploy
                  path: deploy
            - name: Create 404.html
              run: echo "404 page not found" >> deploy/404.html
            - name: Publish to Cloudflare
              uses: cloudflare/pages-action@v1
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  projectName: ${{ vars.CLOUDFLARE_PROJECT_NAME }}
                  gitHubToken: ${{ secrets.GITHUB_TOKEN }}
                  branch:  ${{ github.head_ref || github.ref_name }}
                  directory: deploy

    deploy-ghpages:
        runs-on: ubuntu-latest
        needs: build
        if: vars.PTX_ENABLE_DEPLOY_GHPAGES == 'yes' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        permissions:
            contents: read
            pages: write
            id-token: write
        concurrency:
            group: "page"
            cancel-in-progress: false
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Download website artifact
              uses: actions/download-artifact@v4
              with:
                  name: deploy
                  path: deploy
            - name: Setup GitHub Pages
              id: check
              uses: actions/configure-pages@v4
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: deploy
            - name: Deploy to Github Pages
              id: deployment
              uses: actions/deploy-pages@v4
