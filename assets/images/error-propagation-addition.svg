<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="350" viewBox="0 0 900 350">
  <!-- Title -->
  <text x="450" y="30" font-size="18" font-weight="bold" text-anchor="middle">Error Propagation: Adding Measurements</text>
  
  <!-- Textbook diagram -->
  <rect x="50" y="60" width="200" height="130" fill="#d4a574" stroke="#8b6f47" stroke-width="2"/>
  <text x="150" y="90" font-size="12" text-anchor="middle" font-weight="bold">Textbook</text>
  
  <!-- Length measurement -->
  <line x1="50" y1="160" x2="250" y2="160" stroke="#000" stroke-width="2"/>
  <line x1="50" y1="155" x2="50" y2="165" stroke="#000" stroke-width="2"/>
  <line x1="250" y1="155" x2="250" y2="165" stroke="#000" stroke-width="2"/>
  <text x="150" y="180" font-size="11" text-anchor="middle">Length: L = 25.0 cm</text>
  <text x="150" y="195" font-size="10" text-anchor="middle" fill="#666">Error: ±0.05 cm</text>
  
  <!-- Width measurement -->
  <line x1="260" y1="60" x2="260" y2="190" stroke="#000" stroke-width="2"/>
  <line x1="255" y1="60" x2="265" y2="60" stroke="#000" stroke-width="2"/>
  <line x1="255" y1="190" x2="265" y2="190" stroke="#000" stroke-width="2"/>
  <text x="305" y="130" font-size="11" text-anchor="start">Width: W = 18.0 cm</text>
  <text x="305" y="145" font-size="10" text-anchor="start" fill="#666">Error: ±0.05 cm</text>
  
  <!-- Perimeter calculation -->
  <rect x="350" y="60" width="520" height="130" fill="#e8f4f8" stroke="#4a90a4" stroke-width="2" rx="5"/>
  <text x="610" y="90" font-size="12" text-anchor="middle" font-weight="bold">Adding Measurements (Perimeter)</text>
  
  <!-- Actual sum -->
  <text x="370" y="120" font-size="11" font-weight="bold">Actual:</text>
  <text x="370" y="140" font-size="11">P = 2L + 2W = 2(25.0) + 2(18.0) = 86.0 cm</text>
  
  <!-- Maximum sum -->
  <text x="370" y="170" font-size="11" font-weight="bold">Maximum:</text>
  <text x="370" y="190" font-size="11">P_max = 2(25.05) + 2(18.05) = 86.2 cm</text>
  
  <!-- Minimum sum -->
  <text x="370" y="220" font-size="11" font-weight="bold">Minimum:</text>
  <text x="370" y="240" font-size="11">P_min = 2(24.95) + 2(17.95) = 85.8 cm</text>
  
  <!-- Error in sum box -->
  <rect x="50" y="220" width="800" height="100" fill="#fff9e6" stroke="#d4af37" stroke-width="2" rx="5"/>
  <text x="450" y="250" font-size="12" text-anchor="middle" font-weight="bold">Key Insight: Error Propagation in Addition</text>
  
  <text x="60" y="280" font-size="11">When adding measurements:</text>
  <text x="80" y="300" font-size="11">• Maximum error = Sum of individual maximum errors</text>
  <text x="80" y="320" font-size="11">• Minimum error = Sum of individual minimum errors</text>
  <text x="80" y="340" font-size="11">• Error in sum = ±(0.05 + 0.05) = ±0.1 cm for each measurement in the sum</text>
</svg>
